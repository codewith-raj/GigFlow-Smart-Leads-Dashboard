version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: gigflow-smart-leads-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - gigflow-smart-leads-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigflow-smart-leads-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/gigflow-smart-leads
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-at-least-32-chars}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:80
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - gigflow-smart-leads-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigflow-smart-leads-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - gigflow-smart-leads-network

volumes:
  mongo_data:
    name: gigflow-smart-leads-mongo-data

networks:
  gigflow-smart-leads-network:
    name: gigflow-smart-leads-network
    driver: bridge
